name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Checkout code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 🔹 Configure AWS credentials
    - name: Configure AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

   # 🔹 Upload project files to S3
    - name: Upload files to S3
  run: |
    aws s3 cp . s3://${{ secrets.S3_BUCKET_NAME }}/ --recursive \
      --exclude ".git/*" \
      --exclude "node_modules/*" \
      --exclude ".github/*"

    # 🔹 Login to ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS --password-stdin \
        ${{ secrets.ECR_REPOSITORY }}

    # 🔹 Build Docker image
    - name: Build Docker Image
      run: docker build -t register-app .

    # 🔹 Tag Docker image
    - name: Tag Image
      run: docker tag register-app:latest ${{ secrets.ECR_REPOSITORY }}:latest

    # 🔹 Push image to ECR
    - name: Push to ECR
      run: docker push ${{ secrets.ECR_REPOSITORY }}:latest

    # 🔹 Deploy to EC2 via SSH
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu

          # Pull latest image
          docker pull ${{ secrets.ECR_REPOSITORY }}:latest

          # Stop and remove old container
          docker rm -f register-container || true

          # Run new container
          docker run -d -p 5000:5000 \
          --name register-container \
          ${{ secrets.ECR_REPOSITORY }}:latest